    <!-- 美食分享小天地 -->
    <section class="container my-5 pt-5" id="interactiveBlog">
        <h2 class="text-center text-danger mb-4">📣 美食分享小天地 🍽️</h2>

        <div class="card p-4 mb-4 shadow">
            <h4 class="mb-3">🗨️ 發表你的料理心得或提問</h4>
            <div class="mb-3">
                <input type="text" id="author" class="form-control" placeholder="你的名字">
            </div>
            <div class="mb-3">
                <input type="text" id="title" class="form-control" placeholder="貼文標題">
            </div>
            <div class="mb-3">
                <textarea id="content" class="form-control" rows="4" placeholder="分享做法、問問題或貼上照片心得..."></textarea>
            </div>
            <button class="btn btn-danger" onclick="submitPost()">發表貼文</button>
        </div>

        <div id="postList" class="d-flex flex-column gap-4">
            <!-- 貼文範例將由 JavaScript 動態加入 -->
        </div>
    </section>

    <!-- 頁腳 -->
    <footer class="footer text-center text-white py-4" style="background-color: #A83B3B;">
        <div class="container">
            <p class="mb-1 fw-bold">© 2025 懶人料理王</p>
            <p class="mb-0 small">
                一起用最簡單的方式，做出滋味。
                <a href="#top" class="text-white text-decoration-underline ms-2">回到上方</a>
            </p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const searchInput = document.getElementById('searchInput');
            const foodCards = document.querySelectorAll('.food-card');

            searchInput.addEventListener('input', function () {
                const keyword = this.value.toLowerCase();
                foodCards.forEach(card => {
                    const name = card.dataset.name.toLowerCase();
                    const desc = card.dataset.desc.toLowerCase();
                    card.style.display = (name.includes(keyword) || desc.includes(keyword)) ? 'block' : 'none';
                });
            });

            const defaultPosts = [
                {
                    author: "小方",
                    title: "有人可以分享好吃的蛋炒飯做法嗎？",
                    content: "我每次炒出來的飯都濕濕黏黏的，不知道要怎麼炒才會粒粒分明，歡迎大家留言分享你們的秘訣～"
                },
                {
                    author: "阿誠",
                    title: "快速完成的三杯雞做法",
                    content: "下班後只用20分鐘就可以完成的三杯雞，重點是九層塔一定要最後再放才香！"
                },
                {
                    author: "Fiona",
                    title: "法式吐司成功了！",
                    content: "第一次試做法式吐司，結果超級成功～加了肉桂粉跟楓糖真的很搭！推薦大家假日一定要試看看～"
                },
                {
                    author: "Dora",
                    title: "求救！我的蛋糕又燒焦了😣",
                    content: "明明照食譜烤，可是外皮又焦又苦，有人知道怎麼控制溫度比較不會焦嗎？"
                },
                {
                    author: "Ken",
                    title: "炒麵燒焦怎麼辦？",
                    content: "今天試著用鐵鍋炒麵，結果底部黏鍋變焦了，有高手知道怎麼避免這種情況嗎？"
                },
                {
                    author: "Amy",
                    title: "我的水果塔完成啦🍓",
                    content: '<img src="images/fruit tart.jpeg" alt="水果塔" class="img-fluid rounded mb-2">花了我一下午的時間，但真的超有成就感！塔皮酥脆、卡士達濃郁，一定要跟大家分享～'
                },
                {
                    author: "Ryan",
                    title: "BBQ時間～週末烤肉日",
                    content: '<img src="images/BBQ.jpeg" alt="烤肉" class="img-fluid rounded mb-2">終於成功烤出完美的肋排，醃料用了蜂蜜和蒜頭，非常推薦～來分享你的祕方吧！'
                }
            ];

            defaultPosts.forEach(post => renderPost(post));
        });

        function submitPost() {
            const author = document.getElementById('author').value.trim();
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();

            if (author && title && content) {
                renderPost({ author, title, content });
                document.getElementById('author').value = '';
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
            }
        }

        function renderPost({ author, title, content }) {
            const postList = document.getElementById('postList');
            const card = document.createElement('div');
            card.className = 'card shadow';
            card.innerHTML = `
                    <div class="card-body">
                        <h5 class="card-title">${title}</h5>
                        <p class="card-text">${content}</p>
                        <button class="btn btn-outline-danger btn-sm me-2" onclick="likePost(this)"><i class="bi bi-heart"></i> 讚 <span class="like-count">0</span></button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="toggleCommentBox(this)">留言</button>
                        <div class="comment-box mt-3" style="display:none;">
                            <input class="form-control mb-2 commenter-name" placeholder="你的名字">
                            <input class="form-control mb-2" placeholder="輸入留言..." onkeydown="handleComment(event, this)">
                            <div class="comment-list small"></div>
                        </div>
                    </div>
                    <div class="card-footer text-end text-muted small">— ${author}</div>
                `;
            postList.prepend(card);
        }

        function likePost(button) {
            const span = button.querySelector('.like-count');
            span.textContent = parseInt(span.textContent) + 1;
        }

        function toggleCommentBox(button) {
            const box = button.nextElementSibling;
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        function handleComment(event, input) {
            if (event.key === 'Enter') {
                const box = input.parentElement;
                const nameInput = box.querySelector('.commenter-name');
                const commentList = box.querySelector('.comment-list');
                const comment = input.value.trim();
                const name = nameInput.value.trim();

                if (comment && name) {
                    const p = document.createElement('p');
                    p.innerHTML = `<strong>${name}:</strong> ${comment}`;
                    commentList.appendChild(p);
                    input.value = '';
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
